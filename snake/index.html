<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Space Snake</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        /* ── Cosmos background ── */
        #cosmos {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* ── Game wrapper ── */
        #wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* ── HUD ── */
        #hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: min(560px, 94vmin);
            color: #e0e0ff;
            text-shadow: 0 0 8px #7b7bff;
            font-size: 15px;
            letter-spacing: 1px;
            user-select: none;
        }

        #hud span {
            font-weight: 700;
            color: #b3f0ff;
        }

        /* ── Canvas ── */
        #game {
            display: block;
            border: 2px solid rgba(140, 120, 255, 0.55);
            border-radius: 6px;
            box-shadow:
                0 0 30px rgba(120, 80, 255, 0.45),
                0 0 70px rgba(60, 20, 180, 0.25),
                inset 0 0 60px rgba(0, 0, 30, 0.6);
            background: transparent;
            /* Scale down on small screens while keeping internal resolution */
            width: min(560px, 94vmin);
            height: min(560px, 94vmin);
            touch-action: none;
        }

        /* ── D-pad ── */
        #dpad {
            display: grid;
            grid-template-areas:
                ". up ."
                "left . right"
                ". down .";
            grid-template-columns: repeat(3, 52px);
            grid-template-rows: repeat(3, 52px);
            gap: 6px;
            margin-top: 8px;
        }

        .dpad-btn {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            border: 1px solid rgba(140, 120, 255, 0.5);
            background: rgba(20, 10, 60, 0.75);
            color: #b3f0ff;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.1s, transform 0.08s;
            box-shadow: 0 0 12px rgba(100, 60, 255, 0.3);
        }

        .dpad-btn:active {
            background: rgba(80, 50, 180, 0.85);
            transform: scale(0.92);
        }

        #dpad-up    { grid-area: up; }
        #dpad-left  { grid-area: left; }
        #dpad-right { grid-area: right; }
        #dpad-down  { grid-area: down; }

        /* Hide D-pad on devices that have a real keyboard (hover capability) */
        @media (hover: hover) and (pointer: fine) {
            #dpad { display: none; }
        }

        /* ── Overlays ── */
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(5, 0, 25, 0.88);
            border: 1px solid rgba(160, 130, 255, 0.5);
            border-radius: 14px;
            padding: 32px 44px;
            text-align: center;
            color: #d8d0ff;
            backdrop-filter: blur(6px);
            box-shadow: 0 0 40px rgba(100, 60, 255, 0.4);
        }

        .overlay h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: #b3f0ff;
            text-shadow: 0 0 16px #4af;
            letter-spacing: 3px;
        }

        .overlay h2 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            color: #ff7b9b;
            text-shadow: 0 0 12px #f05;
            letter-spacing: 2px;
        }

        .overlay p {
            font-size: 0.95rem;
            color: #a9a0d0;
            margin-bottom: 6px;
            line-height: 1.6;
        }

        .overlay .score-display {
            font-size: 1.1rem;
            color: #b3f0ff;
            margin: 10px 0;
        }

        .overlay button {
            margin-top: 18px;
            padding: 10px 32px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #000020;
            background: linear-gradient(135deg, #7af, #b3f0ff);
            border: none;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(120, 200, 255, 0.5);
            transition: transform 0.12s, box-shadow 0.12s;
        }

        .overlay button:hover {
            transform: scale(1.06);
            box-shadow: 0 0 32px rgba(120, 200, 255, 0.8);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <!-- Cosmos canvas (background) -->
    <canvas id="cosmos"></canvas>

    <div id="wrapper">
        <div id="hud">
            <div>SCORE &nbsp;<span id="scoreVal">0</span></div>
            <div>🍄 &nbsp;SPACE SNAKE</div>
            <div>BEST &nbsp;<span id="bestVal">0</span></div>
        </div>

        <div style="position:relative;">
            <canvas id="game" width="560" height="560"></canvas>

            <!-- Start overlay -->
            <div class="overlay" id="startScreen">
                <h1>🚀 SPACE SNAKE</h1>
                <p>Navigate the cosmos.<br>Eat mushrooms, grow longer.<br>Don't eat yourself!</p>
                <p style="margin-top:10px; font-size:0.85rem; opacity:0.65;">Arrow keys / WASD · Swipe or D-pad on mobile</p>
                <button id="startBtn">LAUNCH</button>
            </div>

            <!-- Game-over overlay -->
            <div class="overlay hidden" id="deathScreen">
                <h2>☠ CONSUMED ITSELF</h2>
                <p>The snake folded into the void.</p>
                <div class="score-display" id="deathScore"></div>
                <button id="retryBtn">TRY AGAIN</button>
            </div>
        </div>

        <!-- D-pad (shown on touch / no-hover devices) -->
        <div id="dpad">
            <button class="dpad-btn" id="dpad-up">▲</button>
            <button class="dpad-btn" id="dpad-left">◀</button>
            <button class="dpad-btn" id="dpad-right">▶</button>
            <button class="dpad-btn" id="dpad-down">▼</button>
        </div>
    </div>

    <script>
        // ════════════════════════════════════════════════════════
        //  COSMOS BACKGROUND
        // ════════════════════════════════════════════════════════
        (function () {
            const cv = document.getElementById('cosmos');
            const ctx = cv.getContext('2d');

            let W, H;
            const STAR_COUNT = 320;
            const stars = [];

            // Nebula blobs
            const nebulae = Array.from({ length: 6 }, () => ({
                x: Math.random(),
                y: Math.random(),
                r: 0.18 + Math.random() * 0.22,
                hue: Math.random() * 360,
                alpha: 0.06 + Math.random() * 0.09,
                dHue: (Math.random() - 0.5) * 0.25
            }));

            function resize() {
                W = cv.width = window.innerWidth;
                H = cv.height = window.innerHeight;
                stars.length = 0;
                for (let i = 0; i < STAR_COUNT; i++) {
                    stars.push({
                        x: Math.random() * W,
                        y: Math.random() * H,
                        r: Math.random() * 1.6 + 0.3,
                        alpha: Math.random() * 0.7 + 0.3,
                        dAlpha: (Math.random() - 0.5) * 0.015,
                        speed: Math.random() * 0.12 + 0.03
                    });
                }
            }

            function drawCosmos(t) {
                ctx.clearRect(0, 0, W, H);

                // Deep space gradient (slowly shifts hue)
                const bgHue = (t * 0.005) % 360;
                const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.75);
                grad.addColorStop(0, `hsl(${bgHue + 240},60%,5%)`);
                grad.addColorStop(0.5, `hsl(${bgHue + 260},70%,3%)`);
                grad.addColorStop(1, '#000');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);

                // Nebula clouds
                for (const n of nebulae) {
                    n.hue += n.dHue;
                    const nx = n.x * W, ny = n.y * H;
                    const rr = n.r * Math.max(W, H);
                    const ng = ctx.createRadialGradient(nx, ny, 0, nx, ny, rr);
                    ng.addColorStop(0, `hsla(${n.hue},80%,55%,${n.alpha})`);
                    ng.addColorStop(1, 'transparent');
                    ctx.fillStyle = ng;
                    ctx.beginPath();
                    ctx.arc(nx, ny, rr, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Stars with twinkle
                for (const s of stars) {
                    s.alpha += s.dAlpha;
                    if (s.alpha > 1 || s.alpha < 0.1) s.dAlpha *= -1;
                    s.y += s.speed;
                    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(200,210,255,${s.alpha.toFixed(2)})`;
                    ctx.fill();
                }
            }

            function loop(t) {
                drawCosmos(t);
                requestAnimationFrame(loop);
            }

            window.addEventListener('resize', resize);
            resize();
            requestAnimationFrame(loop);
        })();


        // ════════════════════════════════════════════════════════
        //  SNAKE GAME
        // ════════════════════════════════════════════════════════
        (function () {
            const CELL = 20;           // px per grid cell
            const COLS = 28;           // grid columns
            const ROWS = 28;           // grid rows
            const TICK = 110;          // ms per game step

            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');

            // Resize canvas to grid
            canvas.width = COLS * CELL;
            canvas.height = ROWS * CELL;

            // ── Overlay elements ──
            const startScreen = document.getElementById('startScreen');
            const deathScreen = document.getElementById('deathScreen');
            const deathScoreEl = document.getElementById('deathScore');
            const scoreEl = document.getElementById('scoreVal');
            const bestEl = document.getElementById('bestVal');

            let snake, dir, nextDir, mushroom, score, best, running, lastTick, animId;
            best = 0;

            // ── Key handling ──
            const keyMap = {
                ArrowUp: [0, -1], ArrowDown: [0, 1], ArrowLeft: [-1, 0], ArrowRight: [1, 0],
                w: [0, -1], s: [0, 1], a: [-1, 0], d: [1, 0],
                W: [0, -1], S: [0, 1], A: [-1, 0], D: [1, 0]
            };

            document.addEventListener('keydown', e => {
                const d = keyMap[e.key];
                if (!d) return;
                // Prevent reversing
                if (d[0] !== -dir[0] || d[1] !== -dir[1]) nextDir = d;
                // Prevent page scroll
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
            });

            document.getElementById('startBtn').addEventListener('click', startGame);
            document.getElementById('retryBtn').addEventListener('click', startGame);

            // ── D-pad buttons ──
            const dpadMap = {
                'dpad-up':    [0, -1],
                'dpad-down':  [0,  1],
                'dpad-left':  [-1, 0],
                'dpad-right': [1,  0]
            };
            for (const [id, d] of Object.entries(dpadMap)) {
                document.getElementById(id).addEventListener('pointerdown', e => {
                    e.preventDefault();
                    if (!running) return;
                    if (d[0] !== -dir[0] || d[1] !== -dir[1]) nextDir = d;
                });
            }

            // ── Touch swipe detection ──
            let touchStartX = 0, touchStartY = 0;
            canvas.addEventListener('touchstart', e => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }, { passive: true });
            canvas.addEventListener('touchend', e => {
                if (!running) return;
                const dx = e.changedTouches[0].clientX - touchStartX;
                const dy = e.changedTouches[0].clientY - touchStartY;
                if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return; // tap, ignore
                let d;
                if (Math.abs(dx) > Math.abs(dy)) {
                    d = dx > 0 ? [1, 0] : [-1, 0];
                } else {
                    d = dy > 0 ? [0, 1] : [0, -1];
                }
                if (d[0] !== -dir[0] || d[1] !== -dir[1]) nextDir = d;
            }, { passive: true });

            // ── Helpers ──
            function rndCell() {
                return { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
            }

            function spawnMushroom() {
                let cell;
                do {
                    cell = rndCell();
                } while (snake.some(s => s.x === cell.x && s.y === cell.y));
                mushroom = cell;
            }

            function startGame() {
                startScreen.classList.add('hidden');
                deathScreen.classList.add('hidden');

                snake = [{ x: 14, y: 14 }, { x: 13, y: 14 }, { x: 12, y: 14 }];
                dir = [1, 0];
                nextDir = [1, 0];
                score = 0;
                scoreEl.textContent = 0;

                spawnMushroom();

                running = true;
                lastTick = null;
                if (animId) cancelAnimationFrame(animId);
                animId = requestAnimationFrame(gameLoop);
            }

            // ── Core loop ──
            function gameLoop(ts) {
                if (!running) return;
                if (!lastTick) lastTick = ts;

                if (ts - lastTick >= TICK) {
                    lastTick = ts;
                    update();
                }

                draw(ts);
                animId = requestAnimationFrame(gameLoop);
            }

            function update() {
                dir = nextDir;
                const head = { x: snake[0].x + dir[0], y: snake[0].y + dir[1] };

                // Wrap walls
                head.x = (head.x + COLS) % COLS;
                head.y = (head.y + ROWS) % ROWS;

                // Self-collision
                if (snake.some(s => s.x === head.x && s.y === head.y)) {
                    die();
                    return;
                }

                snake.unshift(head);

                if (head.x === mushroom.x && head.y === mushroom.y) {
                    score++;
                    scoreEl.textContent = score;
                    if (score > best) { best = score; bestEl.textContent = best; }
                    spawnMushroom();
                } else {
                    snake.pop();
                }
            }

            function die() {
                running = false;
                cancelAnimationFrame(animId);
                drawDeathEffect(() => {
                    deathScoreEl.textContent = `Score: ${score}${score > 0 ? '  ·  Mushrooms eaten: ' + score : ''}`;
                    deathScreen.classList.remove('hidden');
                });
            }

            // ── Drawing ──
            // Palette for snake segments — cosmic gradient
            function segColor(i, total, ts) {
                const hue = (200 + (i / total) * 80 + ts * 0.02) % 360;
                return `hsl(${hue}, 90%, ${55 - i * 0.4}%)`;
            }

            function drawGrid() {
                ctx.strokeStyle = 'rgba(80,60,140,0.12)';
                ctx.lineWidth = 0.5;
                for (let x = 0; x <= COLS; x++) {
                    ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, ROWS * CELL); ctx.stroke();
                }
                for (let y = 0; y <= ROWS; y++) {
                    ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(COLS * CELL, y * CELL); ctx.stroke();
                }
            }

            function drawSnake(ts) {
                const total = snake.length;
                for (let i = total - 1; i >= 0; i--) {
                    const { x, y } = snake[i];
                    const px = x * CELL, py = y * CELL;
                    const color = segColor(i, total, ts);

                    // glow
                    ctx.shadowColor = color;
                    ctx.shadowBlur = i === 0 ? 18 : 8;

                    // body pill
                    ctx.fillStyle = color;
                    roundRect(ctx, px + 2, py + 2, CELL - 4, CELL - 4, 5);
                    ctx.fill();

                    // inner highlight
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = 'rgba(255,255,255,0.18)';
                    roundRect(ctx, px + 4, py + 4, CELL - 10, CELL - 10, 3);
                    ctx.fill();

                    // eyes on head
                    if (i === 0) drawEyes(px, py);
                }
                ctx.shadowBlur = 0;
            }

            function drawEyes(px, py) {
                const [dx, dy] = dir;
                const ex1 = px + CELL / 2 + dy * 4 - dx * 0;
                const ey1 = py + CELL / 2 - dx * 4 - dy * 0;
                const ex2 = px + CELL / 2 - dy * 4 - dx * 0;
                const ey2 = py + CELL / 2 + dx * 4 - dy * 0;

                // Eye base offset in movement direction
                const ox = dx * 3, oy = dy * 3;

                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(ex1 + ox, ey1 + oy, 2.8, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(ex2 + ox, ey2 + oy, 2.8, 0, Math.PI * 2); ctx.fill();

                ctx.fillStyle = '#111';
                ctx.beginPath(); ctx.arc(ex1 + ox + dx * 0.8, ey1 + oy + dy * 0.8, 1.4, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(ex2 + ox + dx * 0.8, ey2 + oy + dy * 0.8, 1.4, 0, Math.PI * 2); ctx.fill();
            }

            function drawMushroom(ts) {
                if (!mushroom) return;
                const px = mushroom.x * CELL + CELL / 2;
                const py = mushroom.y * CELL + CELL / 2;
                const bob = Math.sin(ts * 0.004) * 1.5;     // gentle float
                const pulse = 0.9 + Math.sin(ts * 0.006) * 0.1;

                ctx.save();
                ctx.translate(px, py + bob);
                ctx.scale(pulse, pulse);

                // Glow
                ctx.shadowColor = '#ff88cc';
                ctx.shadowBlur = 16;

                // Stem
                ctx.fillStyle = '#f0e0c8';
                ctx.beginPath();
                ctx.roundRect(-3, 1, 6, 5, 2);
                ctx.fill();

                // Spots on cap
                const capColor1 = `hsl(${(ts * 0.05) % 360}, 85%, 55%)`;
                const capColor2 = `hsl(${(ts * 0.05 + 30) % 360}, 75%, 65%)`;

                // Cap
                ctx.fillStyle = capColor1;
                ctx.beginPath();
                ctx.ellipse(0, 0, 7, 5, 0, Math.PI, 0);
                ctx.fill();

                // Spots
                ctx.fillStyle = capColor2;
                ctx.beginPath(); ctx.arc(-2.5, -2, 1.2, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(2.5, -2.5, 0.9, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(0.5, -3.5, 0.7, 0, Math.PI * 2); ctx.fill();

                ctx.shadowBlur = 0;
                ctx.restore();
            }

            function draw(ts) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawGrid();
                drawMushroom(ts);
                drawSnake(ts);
            }

            // ── Death flash effect ──
            function drawDeathEffect(done) {
                let frame = 0;
                const flashes = 6;
                function flash() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    drawGrid();

                    // Flash the dead snake red
                    const alpha = (frame % 2 === 0) ? 0.85 : 0.2;
                    for (const s of snake) {
                        ctx.fillStyle = `rgba(255,50,80,${alpha})`;
                        ctx.shadowColor = '#ff1040';
                        ctx.shadowBlur = 14;
                        roundRect(ctx, s.x * CELL + 2, s.y * CELL + 2, CELL - 4, CELL - 4, 5);
                        ctx.fill();
                    }
                    ctx.shadowBlur = 0;
                    frame++;
                    if (frame < flashes * 2) {
                        setTimeout(flash, 80);
                    } else {
                        done();
                    }
                }
                flash();
            }

            // ── Util ──
            function roundRect(ctx, x, y, w, h, r) {
                ctx.beginPath();
                ctx.moveTo(x + r, y);
                ctx.lineTo(x + w - r, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + r);
                ctx.lineTo(x + w, y + h - r);
                ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                ctx.lineTo(x + r, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - r);
                ctx.lineTo(x, y + r);
                ctx.quadraticCurveTo(x, y, x + r, y);
                ctx.closePath();
            }

        })();
    </script>
</body>

</html>
